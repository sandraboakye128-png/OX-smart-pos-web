{% extends 'base.html' %}

{% block content %}
<div class="p-4 md:p-6 space-y-6">

    <!-- ===== HEADER ===== -->
    <div class="bg-white rounded-3xl shadow-sm p-6 border border-gray-100/80">
        <div class="flex flex-wrap justify-between items-center gap-3">
            <div>
                <h1 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                    <i class="fas fa-users-cog text-teal-500"></i> User Management
                </h1>
                <p class="text-gray-500 text-sm mt-1">Manage system users and their permissions</p>
            </div>
            <div class="text-sm">
                <span class="bg-teal-100 text-teal-700 px-3 py-1.5 rounded-full font-medium inline-flex items-center gap-2">
                    <i class="fas fa-user-circle"></i> {{ current_user.username }}
                    <span class="text-xs bg-teal-200 text-teal-800 px-2 py-0.5 rounded-full">{{ current_user.role }}</span>
                </span>
            </div>
        </div>
    </div>

    <!-- Hidden inputs -->
    <input type="hidden" id="currentUserId" value="{{ current_user.id|default(0) }}">
    <input type="hidden" id="currentUsername" value="{{ current_user.username|default('') }}">

    <!-- ===== CREATE USER FORM ===== -->
    <div class="bg-white rounded-3xl shadow-sm p-6 border border-gray-100/80">
        <h2 class="text-lg font-semibold text-gray-700 mb-4 flex items-center gap-2">
            <i class="fas fa-user-plus text-teal-500"></i> Create New User
        </h2>
        <form id="createUserForm" class="flex flex-wrap items-end gap-4">
            <div>
                <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Username</label>
                <input type="text" id="newUsername" required autocomplete="off"
                       class="border border-gray-200 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-teal-300 outline-none w-48">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Password</label>
                <input type="password" id="newPassword" required autocomplete="new-password"
                       class="border border-gray-200 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-teal-300 outline-none w-48">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Role</label>
                <select id="newRole" class="border border-gray-200 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-teal-300 outline-none bg-white">
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <button type="submit" class="bg-teal-500 hover:bg-teal-600 text-white px-5 py-2 rounded-xl text-sm font-medium transition flex items-center gap-2">
                <i class="fas fa-plus"></i> Create User
            </button>
        </form>
        <div id="createMessage" class="mt-3 text-sm"></div>
    </div>

    <!-- ===== USERS TABLE ===== -->
    <div class="bg-white rounded-3xl shadow-sm border border-gray-100/80 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50/80">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">ID</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Username</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Role</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Created</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody" class="bg-white divide-y divide-gray-100">
                    <!-- rows inserted by JS -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ===== GET CURRENT USER =====
    const currentUserId = parseInt(document.getElementById('currentUserId').value) || 0;
    const currentUsername = document.getElementById('currentUsername').value || '';

    // ===== FETCH USERS =====
    async function fetchUsers() {
        const res = await fetch('/api/admin/users');
        if (!res.ok) throw new Error('Failed to fetch users');
        return res.json();
    }

    // ===== ESCAPE HTML =====
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ===== GET STATUS BADGE =====
    function getStatusBadge(role, isProtected) {
        if (isProtected) {
            return '<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium bg-red-100 text-red-700"><i class="fas fa-shield-alt"></i> Protected</span>';
        }
        if (role === 'admin') {
            return '<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium bg-purple-100 text-purple-700"><i class="fas fa-crown"></i> Admin</span>';
        }
        return '<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium bg-green-100 text-green-700"><i class="fas fa-user"></i> User</span>';
    }

    // ===== RENDER USERS =====
    function renderUsers(users) {
        const tbody = document.getElementById('usersTableBody');
        tbody.innerHTML = '';
        if (users.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-center py-8 text-gray-400">No users found.</td></tr>`;
            return;
        }
        users.forEach(user => {
            const tr = document.createElement('tr');
            const isCurrentUser = user.id === currentUserId;
            const isProtected = user.username && user.username.toLowerCase() === 'oxbee';
            const statusBadge = getStatusBadge(user.role, isProtected);
            
            tr.className = 'hover:bg-gray-50/60 transition';
            tr.innerHTML = `
                <td class="px-6 py-3 whitespace-nowrap text-sm text-gray-500">${user.id}</td>
                <td class="px-6 py-3 whitespace-nowrap text-sm text-gray-800 font-medium">
                    ${escapeHtml(user.username)}
                    ${isCurrentUser ? ' <span class="text-xs text-teal-500 font-normal">(You)</span>' : ''}
                    ${isProtected ? ' <span class="text-xs text-red-500"><i class="fas fa-lock"></i></span>' : ''}
                </td>
                <td class="px-6 py-3 whitespace-nowrap text-sm">${statusBadge}</td>
                <td class="px-6 py-3 whitespace-nowrap text-sm text-gray-400">${user.created_at ? new Date(user.created_at).toLocaleString() : '—'}</td>
                <td class="px-6 py-3 whitespace-nowrap text-sm font-medium">
                    <div class="flex items-center gap-2">
                        <!-- Edit Button -->
                        <a href="/admin/users/${user.id}/edit" 
                           class="text-blue-600 hover:text-blue-800 transition ${isProtected ? 'opacity-50 cursor-not-allowed' : ''}"
                           ${isProtected ? 'onclick="return false;" title="Cannot edit system administrator"' : ''}>
                            <i class="fas fa-edit"></i>
                        </a>
                        
                        ${!isCurrentUser && !isProtected ? `
                            <button class="role-toggle text-indigo-600 hover:text-indigo-800 transition" 
                                    data-id="${user.id}" 
                                    data-role="${user.role === 'admin' ? 'user' : 'admin'}"
                                    title="${user.role === 'admin' ? 'Demote to User' : 'Promote to Admin'}">
                                <i class="fas ${user.role === 'admin' ? 'fa-arrow-down' : 'fa-arrow-up'}"></i>
                            </button>
                            <button class="delete-user text-red-500 hover:text-red-700 transition" data-id="${user.id}" title="Delete User">
                                <i class="fas fa-trash"></i>
                            </button>
                        ` : ''}
                        
                        ${isProtected && !isCurrentUser ? `
                            <span class="text-xs text-gray-400"><i class="fas fa-shield-alt"></i> System</span>
                        ` : ''}
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });

        // ===== ROLE TOGGLE =====
        document.querySelectorAll('.role-toggle').forEach(btn => {
            btn.addEventListener('click', async function() {
                const userId = this.dataset.id;
                const newRole = this.dataset.role;
                if (!confirm(`Change role to "${newRole}"?`)) return;
                try {
                    const res = await fetch(`/api/admin/users/${userId}/role`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ role: newRole })
                    });
                    const data = await res.json();
                    if (data.success) {
                        loadUsers();
                    } else {
                        alert('❌ Failed: ' + (data.error || 'Unknown error'));
                    }
                } catch (err) {
                    alert('❌ Error: ' + err.message);
                }
            });
        });

        // ===== DELETE USER =====
        document.querySelectorAll('.delete-user').forEach(btn => {
            btn.addEventListener('click', async function() {
                const userId = this.dataset.id;
                if (!confirm('🗑️ Delete this user?\n\n⚠️ This action cannot be undone.')) return;
                if (!confirm('⚠️ Are you absolutely sure? This is permanent.')) return;
                try {
                    const res = await fetch(`/api/admin/users/${userId}`, { method: 'DELETE' });
                    const data = await res.json();
                    if (data.success) {
                        loadUsers();
                    } else {
                        alert('❌ Failed: ' + (data.error || 'Unknown error'));
                    }
                } catch (err) {
                    alert('❌ Error: ' + err.message);
                }
            });
        });
    }

    // ===== LOAD USERS =====
    async function loadUsers() {
        try {
            const users = await fetchUsers();
            renderUsers(users);
        } catch (err) {
            console.error(err);
            document.getElementById('usersTableBody').innerHTML =
                `<tr><td colspan="5" class="text-center py-8 text-red-400">❌ Failed to load users: ${escapeHtml(err.message)}</td></tr>`;
        }
    }

    // ===== CREATE USER =====
    document.getElementById('createUserForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('newUsername').value.trim();
        const password = document.getElementById('newPassword').value.trim();
        const role = document.getElementById('newRole').value;
        const msg = document.getElementById('createMessage');

        if (!username || !password) {
            msg.className = 'text-red-500 text-sm';
            msg.innerHTML = '<i class="fas fa-exclamation-circle mr-1"></i> Username and password are required.';
            return;
        }
        if (password.length < 4) {
            msg.className = 'text-red-500 text-sm';
            msg.innerHTML = '<i class="fas fa-exclamation-circle mr-1"></i> Password must be at least 4 characters.';
            return;
        }

        msg.className = 'text-gray-400 text-sm';
        msg.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i> Creating user...';
        
        try {
            const res = await fetch('/api/admin/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, role })
            });
            const data = await res.json();
            if (data.success) {
                msg.className = 'text-green-500 text-sm';
                msg.innerHTML = '<i class="fas fa-check-circle mr-1"></i> User created successfully!';
                document.getElementById('newUsername').value = '';
                document.getElementById('newPassword').value = '';
                loadUsers();
            } else {
                msg.className = 'text-red-500 text-sm';
                msg.innerHTML = '<i class="fas fa-exclamation-circle mr-1"></i> ' + (data.error || 'Unknown error');
            }
        } catch (err) {
            msg.className = 'text-red-500 text-sm';
            msg.innerHTML = '<i class="fas fa-exclamation-circle mr-1"></i> Network error: ' + err.message;
        }
    });

    // ===== INITIAL LOAD =====
    loadUsers();
</script>
{% endblock %}
