{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-teal-50 via-white to-indigo-50">
    <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md border border-gray-100/80">
        <!-- Brand -->
        <div class="text-center mb-7">
            <div class="flex justify-center items-center gap-2 mb-2">
                <span class="text-4xl">🧾</span>
                <span class="text-3xl font-extrabold text-gray-800">Vendrex</span>
            </div>
            <p class="text-gray-400 text-sm tracking-wide">Westlink Supermarket · POS</p>
            <div class="w-16 h-1 bg-teal-400 rounded-full mx-auto mt-3"></div>
            <h2 class="text-2xl font-bold text-gray-700 mt-4">Create Account</h2>
            <p class="text-gray-400 text-sm mt-1">Sign up to continue</p>
        </div>
        
        <form id="signupForm">
            <div class="mb-4">
                <label class="block text-gray-600 text-sm font-semibold mb-1.5">
                    <i class="fas fa-user text-teal-500 mr-2"></i> Username
                </label>
                <input type="text" id="username" name="username" required autocomplete="off"
                       class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-transparent transition bg-gray-50/50">
            </div>
            <div class="mb-4">
                <label class="block text-gray-600 text-sm font-semibold mb-1.5">
                    <i class="fas fa-lock text-teal-500 mr-2"></i> Password
                </label>
                <input type="password" id="password" name="password" required autocomplete="new-password"
                       class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-transparent transition bg-gray-50/50">
                <p class="text-xs text-gray-400 mt-1"><i class="fas fa-info-circle mr-1"></i> Password must be at least 4 characters</p>
            </div>
            <div class="mb-4 flex items-center">
                <label class="flex items-center cursor-pointer">
                    <input type="checkbox" id="showPassword" class="mr-2 w-4 h-4 text-teal-500 rounded focus:ring-teal-400">
                    <span class="text-sm text-gray-500"><i class="far fa-eye mr-1"></i> Show Password</span>
                </label>
            </div>
            <div id="roleContainer" class="mb-6">
                <label class="block text-gray-600 text-sm font-semibold mb-1.5">
                    <i class="fas fa-shield-alt text-teal-500 mr-2"></i> Role
                </label>
                <select id="role" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-transparent transition bg-gray-50/50">
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
                <p id="roleNote" class="text-xs text-gray-400 mt-1"></p>
            </div>
            <button type="submit" class="w-full bg-teal-500 hover:bg-teal-600 text-white font-semibold py-2.5 px-4 rounded-xl transition shadow-md hover:shadow-lg flex items-center justify-center gap-2">
                <i class="fas fa-user-plus"></i> Register
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <p class="text-gray-500 text-sm">Already have an account? 
                <a href="/login" class="text-teal-500 hover:text-teal-600 font-semibold hover:underline">Login</a>
            </p>
        </div>

        <!-- Footer note -->
        <div class="mt-6 pt-4 border-t border-gray-100 text-center">
            <p class="text-[0.6rem] text-gray-400 uppercase tracking-wider">Powered by Hummingbird Digital Solutions</p>
        </div>
    </div>
</div>

<script>
    // ----- CLEAR FORM FIELDS -----
    function clearFormFields() {
        document.querySelectorAll('#signupForm input[type="text"], #signupForm input[type="password"]').forEach(input => {
            input.value = '';
        });
        document.getElementById('showPassword').checked = false;
        document.getElementById('password').type = 'password';
        document.getElementById('role').value = 'user';
    }

    // Force clear multiple times to beat browser autofill
    function forceClear() {
        clearFormFields();
        setTimeout(clearFormFields, 50);
        setTimeout(clearFormFields, 200);
    }

    // Clear on page load
    document.addEventListener('DOMContentLoaded', function() {
        forceClear();
        checkAdminCount();
    });

    // Clear also when page is restored from bfcache (back/forward)
    window.addEventListener('pageshow', function(event) {
        if (event.persisted) {
            forceClear();
            checkAdminCount();
        }
    });

    // ----- TOGGLE PASSWORD VISIBILITY -----
    const showPasswordCheckbox = document.getElementById('showPassword');
    const passwordField = document.getElementById('password');
    showPasswordCheckbox.addEventListener('change', () => {
        passwordField.type = showPasswordCheckbox.checked ? 'text' : 'password';
    });

    // ----- CHECK ADMIN COUNT -----
    async function checkAdminCount() {
        try {
            const res = await fetch('/api/auth/admin_count');
            const data = await res.json();
            const adminCount = data.admin_count || 0;
            const roleContainer = document.getElementById('roleContainer');
            const roleNote = document.getElementById('roleNote');
            
            if (adminCount >= 2) {
                roleContainer.style.display = 'none';
                document.getElementById('role').value = 'user';
                roleNote.textContent = 'Maximum 2 admins reached. New accounts will be regular users.';
            } else {
                roleContainer.style.display = 'block';
                if (adminCount === 0) {
                    roleNote.textContent = 'First user can create an Admin account.';
                } else if (adminCount === 1) {
                    roleNote.textContent = 'You can create one more Admin account (2 admins max).';
                } else {
                    roleNote.textContent = '';
                }
            }
        } catch (error) {
            console.error('Error checking admin count:', error);
            document.getElementById('roleContainer').style.display = 'block';
        }
    }

    // ----- HANDLE SIGNUP SUBMISSION -----
    const signupForm = document.getElementById('signupForm');
    signupForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        
        if (!username) {
            alert('Please enter a username');
            return;
        }
        if (password.length < 4) {
            alert('Password must be at least 4 characters long');
            return;
        }
        
        let role = 'user';
        const roleContainer = document.getElementById('roleContainer');
        if (roleContainer.style.display !== 'none') {
            role = document.getElementById('role').value;
        }
        
        // Disable button during submission
        const submitBtn = signupForm.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Registering...';
        
        try {
            const response = await fetch('/api/auth/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, role })
            });
            
            const data = await response.json();
            
            if (data.success) {
                if (role === 'admin') {
                    alert('✅ Admin account created successfully! Please login with your credentials.');
                } else {
                    alert('✅ Account created successfully! Please login.');
                }
                window.location.href = '/login';
            } else {
                alert('❌ Signup failed: ' + (data.error || 'Username may already exist'));
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-user-plus mr-2"></i> Register';
            }
        } catch (error) {
            console.error('Signup error:', error);
            alert('❌ Network error. Please try again.');
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-user-plus mr-2"></i> Register';
        }
    });
</script>
{% endblock %}
