{% extends 'base.html' %}

{% block content %}
<div class="p-4 md:p-6 space-y-6">

    <!-- Offline banner -->
    <div id="offlineBanner" class="mb-4 bg-red-50 border-l-4 border-red-500 text-red-700 px-4 py-3 rounded-xl hidden">
        <i class="fas fa-exclamation-triangle mr-2"></i> You are offline – showing cached purchases. New purchases will be saved and synced when you reconnect.
    </div>

    <!-- Cache banner -->
    <div id="cacheBanner" class="mb-4 bg-yellow-50 border-l-4 border-yellow-500 text-yellow-700 px-4 py-3 rounded-xl hidden">
        <i class="fas fa-database mr-2"></i> Showing cached data (last updated: <span id="cacheTimestamp"></span>).
        <button onclick="refreshData()" class="underline font-bold hover:text-yellow-800">Click here to refresh</button>
    </div>

    <!-- ===== HEADER ===== -->
    <div class="flex flex-wrap justify-between items-center gap-3 bg-white p-4 rounded-3xl shadow-sm border border-gray-100/80">
        <div class="flex items-center gap-3">
            <h1 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                <i class="fas fa-shopping-cart text-teal-500"></i> Purchases
            </h1>
            <span class="bg-teal-100 text-teal-700 text-xs font-semibold px-3 py-1 rounded-full">General</span>
        </div>
        <div class="flex items-center gap-2">
            <button id="viewPendingBtn" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-1.5 rounded-xl text-sm font-medium transition flex items-center gap-2">
                <i class="fas fa-clock"></i> Pending
                <span id="pendingCount" class="bg-red-500 text-white text-xs rounded-full px-2 py-0.5 hidden">0</span>
            </button>
        </div>
    </div>

    <!-- ===== ADD / EDIT FORM ===== -->
    <div class="bg-white rounded-3xl shadow-sm p-6 border border-gray-100/80">
        <div class="flex items-center gap-2 mb-5">
            <h2 class="text-xl font-bold text-gray-700" id="formTitle">
                <i class="fas fa-plus-circle text-teal-500 mr-2"></i> Add Purchase
            </h2>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-7 gap-3">
            <div class="relative">
                <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Product Name</label>
                <input type="text" id="name" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-teal-300 outline-none" autocomplete="off">
                <div id="nameSuggestions" class="absolute z-10 bg-white border border-gray-200 rounded-xl shadow-lg hidden w-full max-h-48 overflow-y-auto"></div>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Brand</label>
                <input type="text" id="brand" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-teal-300 outline-none">
            </div>
            <div class="relative">
                <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Category</label>
                <input type="text" id="category" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-teal-300 outline-none" autocomplete="off" placeholder="Accessory">
                <div id="categorySuggestions" class="absolute z-10 bg-white border border-gray-200 rounded-xl shadow-lg hidden w-full max-h-48 overflow-y-auto"></div>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Quantity</label>
                <input type="number" id="quantity" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-teal-300 outline-none">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Cost Price (₵)</label>
                <input type="number" step="0.01" id="cost_price" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-teal-300 outline-none">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Discount (₵)</label>
                <input type="number" step="0.01" id="discount" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-teal-300 outline-none" value="0">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Selling Price (₵)</label>
                <input type="number" step="0.01" id="selling_price" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-teal-300 outline-none">
            </div>
        </div>
        <div class="mt-4 flex flex-wrap gap-3">
            <button id="submitBtn" class="bg-teal-500 hover:bg-teal-600 text-white px-6 py-2 rounded-xl text-sm font-medium transition shadow-sm hover:shadow">
                <i class="fas fa-plus mr-2"></i> Add Purchase
            </button>
            <button id="cancelBtn" class="bg-gray-300 hover:bg-gray-400 text-gray-700 px-6 py-2 rounded-xl text-sm font-medium transition hidden">
                <i class="fas fa-times mr-2"></i> Cancel Edit
            </button>
        </div>
    </div>

    <!-- ===== SEARCH & FILTER BAR ===== -->
    <div class="bg-white rounded-3xl shadow-sm p-4 border border-gray-100/80 flex flex-wrap gap-3 items-end">
        <div class="flex-1 min-w-[180px]">
            <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Search</label>
            <input type="text" id="searchInput" placeholder="🔍 Name, brand, or category..." class="w-full border border-gray-200 rounded-xl px-3 py-1.5 text-sm focus:ring-2 focus:ring-teal-300 outline-none">
        </div>
        <div>
            <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">From</label>
            <input type="date" id="fromDate" class="border border-gray-200 rounded-xl px-3 py-1.5 text-sm focus:ring-2 focus:ring-teal-300 outline-none">
        </div>
        <div>
            <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">To</label>
            <input type="date" id="toDate" class="border border-gray-200 rounded-xl px-3 py-1.5 text-sm focus:ring-2 focus:ring-teal-300 outline-none">
        </div>
        <button id="filterBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-xl text-sm font-medium transition">
            <i class="fas fa-filter mr-1"></i> Filter
        </button>
        <button id="pdfBtn" class="bg-teal-500 hover:bg-teal-600 text-white px-4 py-1.5 rounded-xl text-sm font-medium transition">
            <i class="fas fa-file-pdf mr-1"></i> PDF Report
        </button>
    </div>

    <!-- ===== PURCHASES LIST ===== -->
    <div class="bg-white rounded-3xl shadow-sm p-5 border border-gray-100/80">
        <div id="purchasesList" class="max-h-[500px] overflow-y-auto space-y-2 pr-1">
            <!-- dynamically loaded -->
        </div>
        <div id="summary" class="mt-4 pt-4 border-t border-gray-100">
            <!-- dynamically loaded -->
        </div>
    </div>
</div>

<!-- ===== PENDING PURCHASES MODAL ===== -->
<div id="pendingModal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center backdrop-blur-sm">
    <div class="bg-white rounded-3xl shadow-2xl w-11/12 max-w-4xl max-h-[90vh] overflow-hidden">
        <div class="sticky top-0 bg-white p-4 border-b flex justify-between items-center">
            <h3 class="text-xl font-bold text-gray-700 flex items-center gap-2">
                <i class="fas fa-clock text-purple-600"></i> Pending Purchases
            </h3>
            <button onclick="closePendingModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
        </div>
        <div id="pendingList" class="p-4 space-y-3 overflow-y-auto max-h-[60vh]">
            <!-- dynamically loaded -->
        </div>
        <div class="sticky bottom-0 bg-white p-4 border-t flex flex-wrap justify-between items-center gap-3">
            <div class="flex flex-wrap gap-2">
                <button onclick="syncAllPending()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-xl text-sm font-medium transition">
                    <i class="fas fa-sync mr-1"></i> Sync All
                </button>
                <button onclick="clearAllPending()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-xl text-sm font-medium transition">
                    <i class="fas fa-trash mr-1"></i> Clear All
                </button>
            </div>
            <button onclick="closePendingModal()" class="bg-gray-300 hover:bg-gray-400 text-gray-700 px-4 py-2 rounded-xl text-sm font-medium transition">Close</button>
        </div>
    </div>
</div>

<script>
    // ---------- Offline banner ----------
    function updateOfflineBanner() {
        const banner = document.getElementById('offlineBanner');
        banner.classList.toggle('hidden', navigator.onLine);
    }
    window.addEventListener('online', updateOfflineBanner);
    window.addEventListener('offline', updateOfflineBanner);

    // ---------- Main variables ----------
    let currentPurchases = [];
    let editMode = false;
    let editBatchId = null;
    let isDataFresh = false;
    const CACHE_KEY = 'cached_purchases_general';
    const CACHE_TIMESTAMP_KEY = 'cached_purchases_general_timestamp';

    // ---------- Helpers ----------
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m] || m);
    }

    function formatDate(dateStr) {
        if (!dateStr) return '';
        return new Date(dateStr).toLocaleString();
    }

    function formatMoney(amount) {
        return '₵' + (parseFloat(amount) || 0).toFixed(2);
    }

    // ---------- Caching ----------
    function getCacheTimestamp() {
        try { return localStorage.getItem(CACHE_TIMESTAMP_KEY); } catch(e) { return null; }
    }

    function cachePurchases(purchases) {
        try {
            localStorage.setItem(CACHE_KEY, JSON.stringify(purchases));
            localStorage.setItem(CACHE_TIMESTAMP_KEY, new Date().toISOString());
            isDataFresh = true;
        } catch(e) {}
    }

    function loadCachedPurchases() {
        try {
            const raw = localStorage.getItem(CACHE_KEY);
            return raw ? JSON.parse(raw) : null;
        } catch(e) { return null; }
    }

    function updateCacheBanner() {
        const banner = document.getElementById('cacheBanner');
        const tsSpan = document.getElementById('cacheTimestamp');
        if (navigator.onLine && !isDataFresh) {
            const cached = loadCachedPurchases();
            if (cached && cached.length) {
                const ts = getCacheTimestamp();
                tsSpan.innerText = ts ? new Date(ts).toLocaleString() : 'unknown';
                banner.classList.remove('hidden');
            } else {
                banner.classList.add('hidden');
            }
        } else {
            banner.classList.add('hidden');
        }
    }

    window.refreshData = function() { loadPurchases(true); };

    // ---------- Pending management ----------
    function getPendingPurchases() {
        try { return JSON.parse(localStorage.getItem('pendingPurchasesGeneral') || '[]'); } catch(e) { return []; }
    }

    function savePendingPurchases(pending) {
        try { localStorage.setItem('pendingPurchasesGeneral', JSON.stringify(pending)); } catch(e) {}
    }

    function updatePendingBadge() {
        const pending = getPendingPurchases();
        const badge = document.getElementById('pendingCount');
        if (badge) {
            badge.textContent = pending.length;
            badge.classList.toggle('hidden', pending.length === 0);
        }
    }

    function viewPendingPurchases() {
        const pending = getPendingPurchases();
        const container = document.getElementById('pendingList');
        const modal = document.getElementById('pendingModal');

        if (!pending.length) {
            container.innerHTML = `
                <div class="text-center text-gray-400 py-10">
                    <i class="fas fa-inbox text-4xl block mb-3"></i>
                    <p>No pending purchases.</p>
                    <p class="text-sm">All purchases have been synced to the server.</p>
                </div>
            `;
        } else {
            container.innerHTML = pending.map((p, idx) => `
                <div class="border border-gray-200 rounded-xl p-4 hover:shadow transition">
                    <div class="flex flex-wrap justify-between items-start gap-3">
                        <div>
                            <div class="flex items-center gap-2 flex-wrap">
                                <span class="text-xs font-semibold ${p.type === 'add' ? 'text-green-600' : 'text-yellow-600'}">
                                    ${p.type === 'add' ? '➕ Add' : '✏️ Update'}
                                </span>
                                <span class="text-xs text-gray-400">${new Date(p.timestamp).toLocaleString()}</span>
                                ${p.batchId ? `<span class="text-xs bg-gray-100 px-2 py-0.5 rounded-full">#${p.batchId}</span>` : ''}
                            </div>
                            <h3 class="font-bold text-gray-800 mt-1">${escapeHtml(p.data.name)} (${escapeHtml(p.data.brand)})</h3>
                            <p class="text-sm text-gray-600">
                                Qty: ${p.data.quantity} | Cost: ₵${p.data.cost_price.toFixed(2)} | Selling: ₵${p.data.selling_price.toFixed(2)}
                                ${p.data.discount ? `| Discount: ₵${p.data.discount.toFixed(2)}` : ''}
                            </p>
                            <p class="text-sm text-gray-500">Category: ${p.data.category || 'Accessory'}</p>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            <button onclick="syncPendingItem(${idx})" class="bg-green-500 hover:bg-green-600 text-white px-3 py-1 rounded-xl text-sm transition">
                                <i class="fas fa-sync mr-1"></i> Sync
                            </button>
                            <button onclick="removePendingItem(${idx})" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-xl text-sm transition">
                                <i class="fas fa-trash mr-1"></i> Remove
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        updatePendingBadge();
        modal.classList.remove('hidden');
    }

    function closePendingModal() {
        document.getElementById('pendingModal').classList.add('hidden');
    }

    async function syncPendingItem(index) {
        const pending = getPendingPurchases();
        const item = pending[index];
        if (!item) return;
        if (!confirm(`Sync this ${item.type === 'add' ? 'addition' : 'update'} for "${item.data.name}"?`)) return;

        try {
            let url = '/api/purchases';
            let method = 'POST';
            if (item.type === 'update' && item.batchId) {
                url = `/api/purchases/${item.batchId}`;
                method = 'PUT';
            }
            const res = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(item.data)
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            if (data.success) {
                pending.splice(index, 1);
                savePendingPurchases(pending);
                updatePendingBadge();
                viewPendingPurchases();
                loadPurchases(true);
                alert(`✅ ${item.type === 'add' ? 'Added' : 'Updated'} successfully!`);
            } else {
                alert('Error: ' + data.error);
            }
        } catch (error) {
            alert('❌ Failed to sync: ' + error.message);
        }
    }

    async function syncAllPending() {
        const pending = getPendingPurchases();
        if (!pending.length) { alert('No pending items to sync.'); return; }
        if (!confirm(`Sync all ${pending.length} pending purchase(s)?`)) return;

        let success = 0, fail = 0;
        for (let i = pending.length - 1; i >= 0; i--) {
            const item = pending[i];
            try {
                let url = '/api/purchases';
                let method = 'POST';
                if (item.type === 'update' && item.batchId) {
                    url = `/api/purchases/${item.batchId}`;
                    method = 'PUT';
                }
                const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(item.data) });
                if (res.ok) {
                    const data = await res.json();
                    if (data.success) { pending.splice(i, 1); success++; }
                    else fail++;
                } else { fail++; }
            } catch(e) { fail++; }
        }
        savePendingPurchases(pending);
        updatePendingBadge();
        viewPendingPurchases();
        loadPurchases(true);
        alert(`✅ Synced: ${success} | ❌ Failed: ${fail}`);
    }

    function removePendingItem(index) {
        const pending = getPendingPurchases();
        const item = pending[index];
        if (!confirm(`Remove pending ${item.type === 'add' ? 'addition' : 'update'} for "${item.data.name}"?`)) return;
        pending.splice(index, 1);
        savePendingPurchases(pending);
        updatePendingBadge();
        viewPendingPurchases();
    }

    function clearAllPending() {
        const pending = getPendingPurchases();
        if (!pending.length) { alert('No pending items to clear.'); return; }
        if (!confirm(`Delete all ${pending.length} pending purchase(s)? This cannot be undone.`)) return;
        savePendingPurchases([]);
        updatePendingBadge();
        viewPendingPurchases();
    }

    // ---------- Load purchases (exclude screens) ----------
    async function loadPurchases(forceRefresh = false) {
        updateOfflineBanner();
        if (forceRefresh) isDataFresh = false;

        let purchases = [];
        if (navigator.onLine) {
            try {
                const res = await fetch('/api/purchases?exclude_category=Screen');
                if (res.ok) {
                    purchases = await res.json();
                    cachePurchases(purchases);
                    isDataFresh = true;
                    // Auto-sync pending
                    const pending = getPendingPurchases();
                    if (pending.length) {
                        console.log(`📦 ${pending.length} pending purchases found - syncing...`);
                        await syncAllPendingSilently();
                    }
                } else {
                    throw new Error('API error');
                }
            } catch (err) {
                console.warn('Using cached data:', err.message);
                const cached = loadCachedPurchases();
                purchases = cached || [];
                isDataFresh = false;
            }
        } else {
            const cached = loadCachedPurchases();
            purchases = cached || [];
            isDataFresh = false;
        }

        currentPurchases = purchases;
        renderList(currentPurchases);
        updateCacheBanner();
        updatePendingBadge();
    }

    async function syncAllPendingSilently() {
        const pending = getPendingPurchases();
        if (!pending.length) return;
        let success = 0, fail = 0;
        for (let i = pending.length - 1; i >= 0; i--) {
            const item = pending[i];
            try {
                let url = '/api/purchases';
                let method = 'POST';
                if (item.type === 'update' && item.batchId) {
                    url = `/api/purchases/${item.batchId}`;
                    method = 'PUT';
                }
                const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(item.data) });
                if (res.ok) {
                    const data = await res.json();
                    if (data.success) { pending.splice(i, 1); success++; }
                    else fail++;
                } else { fail++; }
            } catch(e) { fail++; }
        }
        if (success || fail) {
            savePendingPurchases(pending);
            updatePendingBadge();
            console.log(`📦 Silent sync: ${success} success, ${fail} failed`);
        }
    }

    // ---------- Render list ----------
    function renderList(purchases) {
        const container = document.getElementById('purchasesList');
        if (!purchases.length) {
            container.innerHTML = `<div class="text-center text-gray-400 py-10">
                <i class="fas fa-box-open text-4xl block mb-3"></i>
                <p>No purchase records found.</p>
            </div>`;
            updateSummary([]);
            return;
        }

        container.innerHTML = purchases.map(p => `
            <div class="border border-gray-100 rounded-xl p-4 hover:shadow-md transition">
                <div class="flex flex-wrap justify-between items-start gap-3">
                    <div>
                        <div class="flex items-center gap-2 flex-wrap">
                            <h3 class="font-bold text-gray-800">${escapeHtml(p.name)}</h3>
                            <span class="text-sm text-gray-500">(${escapeHtml(p.brand)})</span>
                            <span class="text-xs bg-gray-100 px-2 py-0.5 rounded-full">#${p.batch_id}</span>
                        </div>
                        <p class="text-sm text-gray-600 mt-1">
                            Qty: ${p.quantity} | Stock: ${p.remaining_quantity || p.quantity} | 
                            Cost: ₵${p.cost_price.toFixed(2)} | Discount: ₵${p.discount.toFixed(2)} | 
                            Selling: ₵${p.selling_price.toFixed(2)}
                        </p>
                        <p class="text-sm text-gray-500">${formatDate(p.date)}</p>
                    </div>
                    <button onclick="editPurchase(${p.batch_id})" class="bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-1.5 rounded-xl text-sm transition">
                        <i class="fas fa-edit mr-1"></i> Update
                    </button>
                </div>
            </div>
        `).join('');
        updateSummary(purchases);
    }

    // ---------- Summary ----------
    function updateSummary(purchases) {
        let totalQty = 0, totalCost = 0, totalDiscount = 0, totalSelling = 0, totalProfit = 0, totalCapital = 0;
        purchases.forEach(p => {
            const qty = p.quantity || 0;
            const cost = p.cost_price || 0;
            const sell = p.selling_price || 0;
            const disc = p.discount || 0;
            totalQty += qty;
            totalCost += p.total_cost || (cost * qty);
            totalDiscount += disc;
            totalSelling += sell * qty;
            totalProfit += (sell - cost) * qty - disc;
            totalCapital += (cost * qty) - disc;
        });

        const isOffline = !navigator.onLine;
        const isCached = !isDataFresh && !isOffline;

        document.getElementById('summary').innerHTML = `
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3 text-sm">
                <div class="bg-gray-50 rounded-xl p-3 text-center">
                    <p class="text-gray-400 text-xs uppercase">Batches</p>
                    <p class="text-xl font-bold text-indigo-600">${purchases.length}</p>
                </div>
                <div class="bg-gray-50 rounded-xl p-3 text-center">
                    <p class="text-gray-400 text-xs uppercase">Total Qty</p>
                    <p class="text-xl font-bold text-blue-600">${totalQty}</p>
                </div>
                <div class="bg-gray-50 rounded-xl p-3 text-center">
                    <p class="text-gray-400 text-xs uppercase">Capital</p>
                    <p class="text-xl font-bold text-purple-600">${formatMoney(totalCapital)}</p>
                </div>
                <div class="bg-gray-50 rounded-xl p-3 text-center">
                    <p class="text-gray-400 text-xs uppercase">Total Selling</p>
                    <p class="text-xl font-bold text-green-600">${formatMoney(totalSelling)}</p>
                </div>
                <div class="bg-gray-50 rounded-xl p-3 text-center">
                    <p class="text-gray-400 text-xs uppercase">Discount</p>
                    <p class="text-xl font-bold text-red-500">${formatMoney(totalDiscount)}</p>
                </div>
                <div class="bg-gray-50 rounded-xl p-3 text-center">
                    <p class="text-gray-400 text-xs uppercase">Profit</p>
                    <p class="text-xl font-bold ${totalProfit >= 0 ? 'text-teal-600' : 'text-red-600'}">${formatMoney(totalProfit)}</p>
                </div>
            </div>
            <div class="mt-2 text-xs text-gray-400 text-center">
                ${isOffline ? '⚠️ Offline mode' : ''}
                ${isCached ? '📦 Showing cached data' : ''}
                ${!isOffline && !isCached ? '✅ Live data' : ''}
            </div>
        `;
    }

    // ---------- Save pending ----------
    function savePendingPurchase(payload, actionType, batchId) {
        const pending = getPendingPurchases();
        pending.push({
            id: Date.now() + '_' + Math.random().toString(36).substr(2,5),
            type: actionType || 'add',
            batchId: batchId || null,
            data: payload,
            timestamp: new Date().toISOString()
        });
        savePendingPurchases(pending);
        updatePendingBadge();
    }

    // ---------- Submit ----------
    async function submitPurchase() {
        const payload = {
            name: document.getElementById('name').value.trim(),
            brand: document.getElementById('brand').value.trim(),
            category: document.getElementById('category').value.trim() || 'Accessory',
            quantity: parseInt(document.getElementById('quantity').value),
            cost_price: parseFloat(document.getElementById('cost_price').value),
            discount: parseFloat(document.getElementById('discount').value) || 0,
            selling_price: parseFloat(document.getElementById('selling_price').value)
        };

        if (!payload.name || !payload.brand || !payload.quantity || !payload.cost_price || !payload.selling_price) {
            alert('Please fill all required fields: Name, Brand, Quantity, Cost Price, Selling Price');
            return;
        }

        let url = '/api/purchases';
        let method = 'POST';
        let actionType = 'add';
        let batchId = null;

        if (editMode) {
            url = `/api/purchases/${editBatchId}`;
            method = 'PUT';
            actionType = 'update';
            batchId = editBatchId;
        }

        try {
            const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.error || `HTTP ${res.status}`);
            }
            const data = await res.json();
            if (data.success) {
                alert(editMode ? '✅ Purchase updated!' : '✅ Purchase added!');
                resetForm();
                loadPurchases(true);
            } else {
                alert('Error: ' + data.error);
            }
        } catch (error) {
            console.warn('Network error, saving offline:', error);
            savePendingPurchase(payload, actionType, batchId);
            alert('⚠️ You are offline. Purchase saved locally and will be synced later.');
            resetForm();
            loadPurchases();
        }
    }

    // ---------- Edit / Reset ----------
    function editPurchase(batchId) {
        const purchase = currentPurchases.find(p => p.batch_id === batchId);
        if (!purchase) return;

        document.getElementById('name').value = purchase.name;
        document.getElementById('brand').value = purchase.brand;
        document.getElementById('category').value = purchase.category || 'Accessory';
        document.getElementById('quantity').value = purchase.quantity;
        document.getElementById('cost_price').value = purchase.cost_price;
        document.getElementById('discount').value = purchase.discount;
        document.getElementById('selling_price').value = purchase.selling_price;

        editMode = true;
        editBatchId = batchId;

        document.getElementById('formTitle').innerHTML = `<i class="fas fa-edit text-yellow-500 mr-2"></i> Update Purchase`;
        document.getElementById('submitBtn').innerHTML = '<i class="fas fa-save mr-2"></i> Update Purchase';
        document.getElementById('cancelBtn').classList.remove('hidden');

        document.querySelector('.bg-white.rounded-3xl.shadow-sm.p-6.border').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function resetForm() {
        document.getElementById('name').value = '';
        document.getElementById('brand').value = '';
        document.getElementById('category').value = '';
        document.getElementById('quantity').value = '';
        document.getElementById('cost_price').value = '';
        document.getElementById('discount').value = '0';
        document.getElementById('selling_price').value = '';

        editMode = false;
        editBatchId = null;

        document.getElementById('formTitle').innerHTML = `<i class="fas fa-plus-circle text-teal-500 mr-2"></i> Add Purchase`;
        document.getElementById('submitBtn').innerHTML = '<i class="fas fa-plus mr-2"></i> Add Purchase';
        document.getElementById('cancelBtn').classList.add('hidden');
    }

    // ---------- Filter ----------
    async function filterPurchases() {
        const from = document.getElementById('fromDate').value;
        const to = document.getElementById('toDate').value;
        if (from && to) {
            try {
                const res = await fetch(`/api/purchases/filter?start_date=${from}&end_date=${to}&exclude_category=Screen`);
                if (!res.ok) throw new Error();
                currentPurchases = await res.json();
                cachePurchases(currentPurchases);
                isDataFresh = true;
                updateCacheBanner();
            } catch {
                alert('Filter unavailable offline. Showing cached data.');
                const cached = loadCachedPurchases();
                if (cached) currentPurchases = cached;
                isDataFresh = false;
                updateCacheBanner();
            }
        } else {
            await loadPurchases();
        }
        applySearch();
    }

    function applySearch() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        if (!keyword) {
            renderList(currentPurchases);
            return;
        }
        const filtered = currentPurchases.filter(p =>
            (p.name && p.name.toLowerCase().includes(keyword)) ||
            (p.brand && p.brand.toLowerCase().includes(keyword)) ||
            (p.category && p.category.toLowerCase().includes(keyword))
        );
        renderList(filtered);
    }

    // ---------- PDF ----------
    async function generatePDF() {
        if (!navigator.onLine) {
            alert('PDF generation requires internet. Please connect and try again.');
            return;
        }
        const from = document.getElementById('fromDate').value;
        const to = document.getElementById('toDate').value;
        const data = { purchases: currentPurchases, from_date: from, to_date: to };

        let totalQty = 0, totalCost = 0, totalDiscount = 0, totalSelling = 0, totalProfit = 0, totalCapital = 0;
        currentPurchases.forEach(p => {
            const qty = p.quantity || 0;
            const cost = p.cost_price || 0;
            const sell = p.selling_price || 0;
            const disc = p.discount || 0;
            totalQty += qty;
            totalCost += p.total_cost || (cost * qty);
            totalDiscount += disc;
            totalSelling += sell * qty;
            totalProfit += (sell - cost) * qty - disc;
            totalCapital += (cost * qty) - disc;
        });
        data.totals = { total_qty: totalQty, total_cost: totalCost, total_discount: totalDiscount, total_selling: totalSelling, total_profit: totalProfit, total_capital: totalCapital, total_batches: currentPurchases.length };

        try {
            const res = await fetch('/api/purchases/pdf', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (!res.ok) throw new Error();
            const blob = await res.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Purchases_General_${new Date().toISOString().slice(0,19)}.pdf`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            window.URL.revokeObjectURL(url);
        } catch {
            alert('Failed to generate PDF. Please try again.');
        }
    }

    // ---------- Autocomplete ----------
    let nameTimeout, catTimeout;

    async function fetchNameSuggestions() {
        if (!navigator.onLine) { document.getElementById('nameSuggestions').classList.add('hidden'); return; }
        const q = document.getElementById('name').value.trim();
        if (!q) { document.getElementById('nameSuggestions').classList.add('hidden'); return; }
        try {
            const res = await fetch(`/api/purchases/suggestions/name?q=${encodeURIComponent(q)}&exclude_category=Screen`);
            if (!res.ok) throw new Error();
            const suggestions = await res.json();
            const box = document.getElementById('nameSuggestions');
            if (!suggestions.length) { box.classList.add('hidden'); return; }
            box.innerHTML = suggestions.map(s => `<div class="px-3 py-1.5 hover:bg-teal-50 cursor-pointer" onclick="selectNameSuggestion('${escapeHtml(s.name)}','${escapeHtml(s.brand)}','${escapeHtml(s.category)}')">${escapeHtml(s.name)} (${escapeHtml(s.brand)})</div>`).join('');
            box.classList.remove('hidden');
            const rect = document.getElementById('name').getBoundingClientRect();
            box.style.top = (rect.bottom + window.scrollY + 4) + 'px';
            box.style.left = rect.left + 'px';
            box.style.width = rect.width + 'px';
        } catch { document.getElementById('nameSuggestions').classList.add('hidden'); }
    }

    async function fetchCategorySuggestions() {
        if (!navigator.onLine) { document.getElementById('categorySuggestions').classList.add('hidden'); return; }
        const q = document.getElementById('category').value.trim();
        if (!q) { document.getElementById('categorySuggestions').classList.add('hidden'); return; }
        try {
            const res = await fetch(`/api/purchases/suggestions/category?q=${encodeURIComponent(q)}&exclude_category=Screen`);
            if (!res.ok) throw new Error();
            const suggestions = await res.json();
            const box = document.getElementById('categorySuggestions');
            if (!suggestions.length) { box.classList.add('hidden'); return; }
            box.innerHTML = suggestions.map(s => `<div class="px-3 py-1.5 hover:bg-teal-50 cursor-pointer" onclick="selectCategorySuggestion('${escapeHtml(s.category)}')">${escapeHtml(s.category)}</div>`).join('');
            box.classList.remove('hidden');
            const rect = document.getElementById('category').getBoundingClientRect();
            box.style.top = (rect.bottom + window.scrollY + 4) + 'px';
            box.style.left = rect.left + 'px';
            box.style.width = rect.width + 'px';
        } catch { document.getElementById('categorySuggestions').classList.add('hidden'); }
    }

    window.selectNameSuggestion = function(name, brand, category) {
        document.getElementById('name').value = name;
        document.getElementById('brand').value = brand;
        document.getElementById('category').value = category || 'Accessory';
        document.getElementById('nameSuggestions').classList.add('hidden');
    };

    window.selectCategorySuggestion = function(cat) {
        document.getElementById('category').value = cat;
        document.getElementById('categorySuggestions').classList.add('hidden');
    };

    // ---------- Event listeners ----------
    document.addEventListener('DOMContentLoaded', function() {
        loadPurchases();
        updatePendingBadge();

        document.getElementById('submitBtn').addEventListener('click', submitPurchase);
        document.getElementById('cancelBtn').addEventListener('click', resetForm);
        document.getElementById('filterBtn').addEventListener('click', filterPurchases);
        document.getElementById('pdfBtn').addEventListener('click', generatePDF);
        document.getElementById('searchInput').addEventListener('input', applySearch);
        document.getElementById('viewPendingBtn').addEventListener('click', viewPendingPurchases);

        document.getElementById('name').addEventListener('input', () => { clearTimeout(nameTimeout); nameTimeout = setTimeout(fetchNameSuggestions, 300); });
        document.getElementById('category').addEventListener('input', () => { clearTimeout(catTimeout); catTimeout = setTimeout(fetchCategorySuggestions, 300); });

        document.addEventListener('click', function(e) {
            if (!e.target.closest('#name')) document.getElementById('nameSuggestions').classList.add('hidden');
            if (!e.target.closest('#category')) document.getElementById('categorySuggestions').classList.add('hidden');
        });
    });

    // Auto-refresh on reconnect
    window.addEventListener('online', function() { loadPurchases(true); });
</script>
{% endblock %}
