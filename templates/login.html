{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-teal-50 via-white to-indigo-50">
    <!-- Offline banner -->
    <div id="offlineBanner" class="fixed top-0 left-0 w-full bg-red-500 text-white text-center py-2.5 z-50 shadow-lg hidden">
        <i class="fas fa-wifi-slash mr-2"></i> You are offline – cannot login. Please connect to the internet.
    </div>

    <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md border border-gray-100/80">
        <!-- Brand -->
        <div class="text-center mb-7">
            <div class="flex justify-center items-center gap-2 mb-2">
                <span class="text-4xl">🧾</span>
                <span class="text-3xl font-extrabold text-gray-800">Vendrex</span>
            </div>
            <p class="text-gray-400 text-sm tracking-wide">Westlink Supermarket · POS</p>
            <div class="w-16 h-1 bg-teal-400 rounded-full mx-auto mt-3"></div>
            <h2 class="text-2xl font-bold text-gray-700 mt-4">Welcome Back</h2>
            <p class="text-gray-400 text-sm mt-1">Login to your account</p>
        </div>
        
        <form id="loginForm">
            <div class="mb-4">
                <label class="block text-gray-600 text-sm font-semibold mb-1.5">
                    <i class="fas fa-user text-teal-500 mr-2"></i> Username
                </label>
                <input type="text" id="username" name="username" required autocomplete="off"
                       class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-transparent transition bg-gray-50/50">
            </div>
            <div class="mb-4">
                <label class="block text-gray-600 text-sm font-semibold mb-1.5">
                    <i class="fas fa-lock text-teal-500 mr-2"></i> Password
                </label>
                <input type="password" id="password" name="password" required autocomplete="new-password"
                       class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-transparent transition bg-gray-50/50">
            </div>
            <div class="mb-6 flex justify-between items-center">
                <label class="flex items-center cursor-pointer">
                    <input type="checkbox" id="showPassword" class="mr-2 w-4 h-4 text-teal-500 rounded focus:ring-teal-400">
                    <span class="text-sm text-gray-500"><i class="far fa-eye mr-1"></i> Show Password</span>
                </label>
                <a href="#" class="text-sm text-teal-500 hover:text-teal-600 font-medium">Forgot password?</a>
            </div>
            <button type="submit" id="loginBtn" class="w-full bg-teal-500 hover:bg-teal-600 text-white font-semibold py-2.5 px-4 rounded-xl transition shadow-md hover:shadow-lg flex items-center justify-center gap-2">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <p class="text-gray-500 text-sm">Don't have an account? 
                <a href="/signup" class="text-teal-500 hover:text-teal-600 font-semibold hover:underline">Create Account</a>
            </p>
        </div>

        <!-- Footer note -->
        <div class="mt-6 pt-4 border-t border-gray-100 text-center">
            <p class="text-[0.6rem] text-gray-400 uppercase tracking-wider">Powered by Hummingbird Digital Solutions</p>
        </div>
    </div>
</div>

<script>
    // ----- OFFLINE BANNER -----
    function updateOfflineBanner() {
        const banner = document.getElementById('offlineBanner');
        const loginBtn = document.getElementById('loginBtn');
        if (!navigator.onLine) {
            banner.classList.remove('hidden');
            loginBtn.disabled = true;
            loginBtn.classList.add('opacity-50', 'cursor-not-allowed');
            loginBtn.innerHTML = '<i class="fas fa-wifi-slash mr-2"></i> Offline – Cannot Login';
        } else {
            banner.classList.add('hidden');
            loginBtn.disabled = false;
            loginBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            loginBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i> Login';
        }
    }
    window.addEventListener('online', updateOfflineBanner);
    window.addEventListener('offline', updateOfflineBanner);

    // ----- CLEAR FORM FIELDS -----
    function clearFormFields() {
        document.querySelectorAll('#loginForm input[type="text"], #loginForm input[type="password"]').forEach(input => {
            input.value = '';
        });
        document.getElementById('showPassword').checked = false;
        document.getElementById('password').type = 'password';
    }

    function forceClear() {
        clearFormFields();
        setTimeout(clearFormFields, 50);
        setTimeout(clearFormFields, 200);
    }

    document.addEventListener('DOMContentLoaded', function() {
        forceClear();
        updateOfflineBanner();
    });

    window.addEventListener('pageshow', function(event) {
        if (event.persisted) {
            forceClear();
            updateOfflineBanner();
        }
    });

    // ----- TOGGLE PASSWORD VISIBILITY -----
    const showPasswordCheckbox = document.getElementById('showPassword');
    const passwordField = document.getElementById('password');
    showPasswordCheckbox.addEventListener('change', () => {
        passwordField.type = showPasswordCheckbox.checked ? 'text' : 'password';
    });
    
    // ----- HANDLE LOGIN SUBMISSION -----
    const loginForm = document.getElementById('loginForm');
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        // Check offline
        if (!navigator.onLine) {
            alert('You are offline. Please connect to the internet and try again.');
            return;
        }
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        
        // Disable button during submission
        const loginBtn = document.getElementById('loginBtn');
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Logging in...';
        
        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            if (!response.ok) {
                const data = await response.json();
                throw new Error(data.error || 'Login failed');
            }
            const data = await response.json();
            if (data.success) {
                window.location.href = '/';
            } else {
                alert('Login failed: ' + data.error);
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i> Login';
            }
        } catch (error) {
            console.error('Login error:', error);
            alert('Login failed. Please check your internet connection and try again.');
            loginBtn.disabled = false;
            loginBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i> Login';
        }
    });
</script>
{% endblock %}
