{% extends 'base.html' %}

{% block content %}
<div class="p-4 md:p-6 space-y-6">
    
    <!-- Header -->
    <div class="bg-white rounded-2xl shadow-sm p-4 md:p-6 border border-gray-100/80">
        <div class="flex flex-wrap justify-between items-center gap-3">
            <div>
                <h1 class="text-xl md:text-2xl font-bold text-gray-800 flex items-center gap-2">
                    <i class="fas fa-cog text-amber-500"></i> Settings
                </h1>
                <p class="text-gray-500 text-[10px] md:text-sm mt-0.5">Customize your application preferences</p>
            </div>
            <div class="flex items-center gap-2">
                <span id="saveStatus" class="text-sm hidden"></span>
                <button id="saveSettingsBtn" class="bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition">
                    <i class="fas fa-save mr-1"></i> Save Settings
                </button>
            </div>
        </div>
    </div>

    <!-- Settings Form -->
    <div class="bg-white rounded-2xl shadow-sm p-4 md:p-6 border border-gray-100/80">
        
        <!-- ===== THEME ===== -->
        <div class="mb-6 pb-6 border-b border-gray-100">
            <h3 class="text-base font-semibold text-gray-700 mb-3 flex items-center gap-2">
                <i class="fas fa-palette text-amber-500"></i> Theme
            </h3>
            <div class="flex flex-wrap gap-3">
                <button class="theme-option px-6 py-3 rounded-xl border-2 transition-all" data-theme="light" id="themeLight">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-sun text-yellow-500 text-xl"></i>
                        <div>
                            <div class="font-medium text-gray-700">Light</div>
                            <div class="text-xs text-gray-400">Default light theme</div>
                        </div>
                    </div>
                </button>
                <button class="theme-option px-6 py-3 rounded-xl border-2 transition-all" data-theme="dark" id="themeDark">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-moon text-indigo-500 text-xl"></i>
                        <div>
                            <div class="font-medium text-gray-700">Dark</div>
                            <div class="text-xs text-gray-400">Dark theme for night use</div>
                        </div>
                    </div>
                </button>
            </div>
        </div>

        <!-- ===== CURRENCY ===== -->
        <div class="mb-6 pb-6 border-b border-gray-100">
            <h3 class="text-base font-semibold text-gray-700 mb-3 flex items-center gap-2">
                <i class="fas fa-money-bill-wave text-amber-500"></i> Currency
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Currency Symbol</label>
                    <select id="currencySymbol" class="w-full border border-gray-200 rounded-xl px-4 py-2 text-sm focus:ring-2 focus:ring-amber-400 outline-none bg-white">
                        <option value="₦">₦ (Naira)</option>
                        <option value="$">$ (Dollar)</option>
                        <option value="€">€ (Euro)</option>
                        <option value="£">£ (Pound)</option>
                        <option value="₵">₵ (Cedi)</option>
                        <option value="R">R (Rand)</option>
                        <option value="KSh">KSh (Kenya Shilling)</option>
                        <option value="TSh">TSh (Tanzania Shilling)</option>
                        <option value="UGX">UGX (Uganda Shilling)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Currency Code</label>
                    <select id="currencyCode" class="w-full border border-gray-200 rounded-xl px-4 py-2 text-sm focus:ring-2 focus:ring-amber-400 outline-none bg-white">
                        <option value="NGN">NGN (Nigerian Naira)</option>
                        <option value="USD">USD (US Dollar)</option>
                        <option value="EUR">EUR (Euro)</option>
                        <option value="GBP">GBP (British Pound)</option>
                        <option value="GHS">GHS (Ghana Cedi)</option>
                        <option value="ZAR">ZAR (South African Rand)</option>
                        <option value="KES">KES (Kenya Shilling)</option>
                        <option value="TZS">TZS (Tanzania Shilling)</option>
                        <option value="UGX">UGX (Uganda Shilling)</option>
                    </select>
                </div>
            </div>
            <div class="mt-3 p-3 bg-gray-50 rounded-xl">
                <p class="text-sm text-gray-600">
                    <span class="font-medium">Preview:</span>
                    <span id="currencyPreview" class="font-bold text-amber-600">₦1,000.00</span>
                </p>
            </div>
        </div>

        <!-- ===== LANGUAGE ===== -->
        <div class="mb-6 pb-6 border-b border-gray-100">
            <h3 class="text-base font-semibold text-gray-700 mb-3 flex items-center gap-2">
                <i class="fas fa-language text-amber-500"></i> Language
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Interface Language</label>
                    <select id="language" class="w-full border border-gray-200 rounded-xl px-4 py-2 text-sm focus:ring-2 focus:ring-amber-400 outline-none bg-white">
                        <option value="en">🇬🇧 English</option>
                        <option value="es">🇪🇸 Spanish</option>
                        <option value="fr">🇫🇷 French</option>
                        <option value="pt">🇵🇹 Portuguese</option>
                        <option value="ha">🇳🇬 Hausa</option>
                        <option value="yo">🇳🇬 Yoruba</option>
                        <option value="ig">🇳🇬 Igbo</option>
                        <option value="pcm">🇳🇬 Nigerian Pidgin</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Date Format</label>
                    <select id="dateFormat" class="w-full border border-gray-200 rounded-xl px-4 py-2 text-sm focus:ring-2 focus:ring-amber-400 outline-none bg-white">
                        <option value="DD/MM/YYYY">DD/MM/YYYY</option>
                        <option value="MM/DD/YYYY">MM/DD/YYYY</option>
                        <option value="YYYY-MM-DD">YYYY-MM-DD</option>
                        <option value="DD-MM-YYYY">DD-MM-YYYY</option>
                        <option value="MM-DD-YYYY">MM-DD-YYYY</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- ===== SESSION INFO ===== -->
        <div class="mb-2">
            <h3 class="text-base font-semibold text-gray-700 mb-3 flex items-center gap-2">
                <i class="fas fa-info-circle text-blue-500"></i> Session Info
            </h3>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">
                <div class="bg-gray-50 rounded-xl p-3">
                    <span class="text-gray-500">User</span>
                    <div class="font-semibold text-gray-800">{{ current_user.username }}</div>
                </div>
                <div class="bg-gray-50 rounded-xl p-3">
                    <span class="text-gray-500">Role</span>
                    <div class="font-semibold text-gray-800">{{ current_user.role }}</div>
                </div>
                <div class="bg-gray-50 rounded-xl p-3">
                    <span class="text-gray-500">Theme</span>
                    <div class="font-semibold text-gray-800" id="currentThemeDisplay">Light</div>
                </div>
                <div class="bg-gray-50 rounded-xl p-3">
                    <span class="text-gray-500">Currency</span>
                    <div class="font-semibold text-gray-800" id="currentCurrencyDisplay">₦</div>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // ===== LOAD SETTINGS =====
        async function loadSettings() {
            try {
                const res = await fetch('/api/settings');
                if (!res.ok) throw new Error('Failed to load settings');
                const data = await res.json();
                
                if (data.success) {
                    const settings = data.settings;
                    
                    // Theme
                    document.getElementById('themeLight').classList.toggle('border-amber-500', settings.theme === 'light');
                    document.getElementById('themeLight').classList.toggle('bg-amber-50', settings.theme === 'light');
                    document.getElementById('themeDark').classList.toggle('border-amber-500', settings.theme === 'dark');
                    document.getElementById('themeDark').classList.toggle('bg-amber-50', settings.theme === 'dark');
                    
                    // Currency
                    document.getElementById('currencySymbol').value = settings.currency_symbol || '₦';
                    document.getElementById('currencyCode').value = settings.currency_code || 'NGN';
                    
                    // Language
                    document.getElementById('language').value = settings.language || 'en';
                    document.getElementById('dateFormat').value = settings.date_format || 'DD/MM/YYYY';
                    
                    // Display current
                    document.getElementById('currentThemeDisplay').textContent = settings.theme === 'dark' ? 'Dark' : 'Light';
                    document.getElementById('currentCurrencyDisplay').textContent = settings.currency_symbol || '₦';
                    
                    updateCurrencyPreview();
                    
                    // Apply theme
                    applyTheme(settings.theme);
                }
            } catch (error) {
                console.error('Error loading settings:', error);
            }
        }

        // ===== APPLY THEME =====
        function applyTheme(theme) {
            const root = document.documentElement;
            if (theme === 'dark') {
                document.body.style.background = '#1a1a2e';
                document.querySelector('.sidebar')?.style.setProperty('background', '#16213e');
                document.querySelector('.mobile-header')?.style.setProperty('background', '#1a1a2e');
                document.querySelector('.mobile-header h1')?.classList.add('text-white');
            } else {
                document.body.style.background = '#f3f4f6';
                document.querySelector('.sidebar')?.style.setProperty('background', '#1E293B');
                document.querySelector('.mobile-header')?.style.setProperty('background', 'white');
                document.querySelector('.mobile-header h1')?.classList.remove('text-white');
            }
        }

        // ===== THEME SELECTION =====
        document.querySelectorAll('.theme-option').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.theme-option').forEach(b => {
                    b.classList.remove('border-amber-500', 'bg-amber-50');
                });
                this.classList.add('border-amber-500', 'bg-amber-50');
                const theme = this.dataset.theme;
                document.getElementById('currentThemeDisplay').textContent = theme === 'dark' ? 'Dark' : 'Light';
                applyTheme(theme);
            });
        });

        // ===== CURRENCY PREVIEW =====
        function updateCurrencyPreview() {
            const symbol = document.getElementById('currencySymbol').value;
            const code = document.getElementById('currencyCode').value;
            document.getElementById('currencyPreview').textContent = `${symbol}1,000.00`;
            document.getElementById('currentCurrencyDisplay').textContent = symbol;
        }

        document.getElementById('currencySymbol').addEventListener('change', updateCurrencyPreview);
        document.getElementById('currencyCode').addEventListener('change', updateCurrencyPreview);

        // ===== SAVE SETTINGS =====
        document.getElementById('saveSettingsBtn').addEventListener('click', async function() {
            const btn = this;
            const status = document.getElementById('saveStatus');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i> Saving...';
            status.classList.remove('hidden', 'text-green-500', 'text-red-500');
            
            const settings = {
                theme: document.querySelector('.theme-option.border-amber-500')?.dataset.theme || 'light',
                currency_symbol: document.getElementById('currencySymbol').value,
                currency_code: document.getElementById('currencyCode').value,
                language: document.getElementById('language').value,
                date_format: document.getElementById('dateFormat').value
            };
            
            try {
                const res = await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(settings)
                });
                const data = await res.json();
                
                if (data.success) {
                    status.textContent = '✅ Settings saved successfully!';
                    status.className = 'text-sm text-green-500';
                    
                    // Apply theme immediately
                    applyTheme(settings.theme);
                    
                    // Reload page after 1.5 seconds to apply all changes
                    setTimeout(() => {
                        window.location.reload();
                    }, 1500);
                } else {
                    status.textContent = '❌ Error: ' + (data.error || 'Failed to save');
                    status.className = 'text-sm text-red-500';
                }
            } catch (error) {
                status.textContent = '❌ Error: ' + error.message;
                status.className = 'text-sm text-red-500';
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save mr-1"></i> Save Settings';
            }
        });

        // ===== LOAD SETTINGS =====
        loadSettings();
    });
</script>
{% endblock %}
